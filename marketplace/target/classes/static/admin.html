<form id="formProducto" class="max-w-md mx-auto p-6 bg-white shadow-lg rounded">
    <h2 class="text-xl mb-4 font-bold">Subir Nuevo Producto</h2>
    <input type="text" id="nombre" placeholder="Nombre" class="w-full mb-3 p-2 border" required>
    <input type="text" id="categoria" placeholder="Categoría" class="w-full mb-3 p-2 border" required>
    <input type="number" id="precio" placeholder="Precio" class="w-full mb-3 p-2 border" required>
    <input type="text" id="imagen" placeholder="URL de la imagen" class="w-full mb-3 p-2 border" required>
    <textarea id="descripcion" placeholder="Descripción" class="w-full mb-3 p-2 border"></textarea>
    <button type="submit" class="w-full bg-primary text-white p-2 rounded">Publicar Producto</button>
</form>
